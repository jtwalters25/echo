name: eval-gate

# Offline replay as a merge gate. Runs entirely from the committed
# corpus.fixture.json (embedded ticket vectors) — no HF or Supabase secrets — so
# a ranker change (model or k) that drops recall@1 below the floor fails the
# build and blocks the PR.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Offline replay (recall@k / MRR)
        run: npm run replay
